app-id: com.github.pisekpiskovec.Breadboard
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: breadboard

finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland

modules:
  - name: breadboard
    buildsystem: simple
    build-commands:
      - install -Dm755 breadboard-x64 /app/bin/breadboard
    sources:
      - type: file
        url: https://github.com/pisekpiskovec/Breadboard/releases/download/v1.2.0/breadboard-x64
        sha256: "7b1774235803ed80ed528d0c61552acbd3ef0eff44b0678d3eb0610a3a7d6e08"
      - type: git
        url: https://github.com/pisekpiskovec/Breadboard.git
        tag: v1.2.0
        dest: src
    post-install:
      - install -Dm644 src/breadboard.desktop /app/share/applications/com.github.pisekpiskovec.Breadboard.desktop
      - install -Dm644 src/assets/icon.png /app/share/icons/hicolor/256x256/apps/com.github.pisekpiskovec.Breadboard.png
